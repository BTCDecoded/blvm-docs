name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:
  # Optional: Schedule for automated submodule updates
  # schedule:
  #   - cron: '0 0 * * 0'  # Weekly on Sunday

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: [self-hosted, Linux, X64, builds]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache governance-vars crate
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            mdbook-governance-vars/target/
          key: ${{ runner.os }}-gov-vars-${{ hashFiles('mdbook-governance-vars/Cargo.lock') }}

      # Submodules: recursive checkout may populate modules/* at pinned SHAs.
      # This step ensures include targets and governance policy YAML exist; if
      # the submodule checkout is incomplete or an older pin lacks files, we
      # shallow-clone the latest default branch from GitHub (same as before).
      - name: Fetch mdBook include sources (governance)
        run: |
          set -eux
          mkdir -p modules
          need_governance_clone=false
          if [ ! -f modules/governance/README.md ] || [ ! -f modules/governance/GOVERNANCE.md ]; then
            need_governance_clone=true
          fi
          if [ ! -f modules/governance/config/action-tiers.yml ] \
            || [ ! -f modules/governance/config/repository-layers.yml ] \
            || [ ! -f modules/governance/config/emergency-tiers.yml ]; then
            need_governance_clone=true
          fi
          if [ "$need_governance_clone" = true ]; then
            rm -rf modules/governance
            git clone --depth 1 https://github.com/BTCDecoded/governance.git modules/governance
          fi

      - name: Verify book inputs (includes + governance config)
        run: ./scripts/verify-book-inputs.sh

      - name: Check governance policy literals use [[gov:…]]
        run: ./scripts/check-governance-literals.sh

      - name: Test governance-vars (allowlist + YAML vs threshold.rs drift)
        run: cargo test --locked --manifest-path mdbook-governance-vars/Cargo.toml

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v1
        with:
          mdbook-version: '0.4.43'

      - name: Install governance-vars preprocessor
        run: cargo install --locked --path mdbook-governance-vars

      - name: Build book
        run: |
          set -o pipefail
          mdbook build 2>&1 | tee mdbook-build.log
          mdbook_status=${PIPESTATUS[0]}
          if [ "$mdbook_status" -ne 0 ]; then
            echo "::error::mdbook build exited with status $mdbook_status"
            exit "$mdbook_status"
          fi
          if grep -qE '^ERROR |^ERROR\]' mdbook-build.log || grep -q 'Failed to deserialize' mdbook-build.log; then
            echo "::error::mdBook reported configuration or include errors (see log above)"
            exit 1
          fi

      - name: Add .nojekyll to deployment root
        run: touch book/.nojekyll
      
      - name: Copy CNAME file to deployment root
        run: |
          if [ -f CNAME ]; then
            cp CNAME book/CNAME
          fi
        
      - name: Copy and inject custom.css
        run: |
          # Copy CSS file to output
          if [ -f custom.css ]; then
            cp custom.css book/custom.css
          fi
          
          # Inject CSS link if mdBook didn't include it (additional-css may not work)
          if [ -f book/index.html ] && ! grep -q "custom.css" book/index.html; then
            echo "Injecting custom.css link into HTML files..."
            python3 << 'EOF'
          import os
          for root, dirs, files in os.walk('book'):
              for file in files:
                  if file.endswith('.html'):
                      path = os.path.join(root, file)
                      with open(path, 'r', encoding='utf-8') as f:
                          content = f.read()
                      if 'custom.css' not in content:
                          # Calculate relative path: depth from book/ root
                          rel_path = os.path.relpath('book', root)
                          if rel_path == '.':
                              css_path = 'custom.css'
                          else:
                              css_path = os.path.join(rel_path, 'custom.css').replace('\\', '/')
                          content = content.replace('</head>', f'<link rel="stylesheet" href="{css_path}">\n</head>')
                          with open(path, 'w', encoding='utf-8') as f:
                              f.write(content)
          EOF
          fi
      
      - name: Inject Mermaid.js for diagram rendering
        run: python3 scripts/postprocess-mermaid.py book

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Assert GitHub Pages source is Actions (not legacy branch)
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/assert-pages-workflow-source.sh

      - name: Verify mdbook artifact before upload
        run: ./scripts/verify-pages-artifact.sh book

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: [self-hosted, Linux, X64, builds]

    needs: build
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live docs site
        run: ./scripts/verify-live-docs-site.sh
